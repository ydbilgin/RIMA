<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111518"/>
      <stop offset="1" stop-color="#060708"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2C2A2A"/>
      <stop offset="0.55" stop-color="#17191B"/>
      <stop offset="1" stop-color="#4A3F3F"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#355B68"/>
      <stop offset="1" stop-color="#A8C8D8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="floor" width="80" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L80 20 L40 40 L0 20 Z" fill="#242323" stroke="#333030" stroke-width="1"/>
      <path d="M42 8 L58 16 L45 25" fill="none" stroke="#3D3535" stroke-width="1"/>
    </pattern>
    <style>
      .label{font-family:Arial, sans-serif;font-size:18px;fill:#D8E6EA;letter-spacing:0}
      .small{font-family:Arial, sans-serif;font-size:13px;fill:#A8C8D8;letter-spacing:0}
      .tiny{font-family:Arial, sans-serif;font-size:11px;fill:#A7A09A;letter-spacing:0}
      .frame{fill:url(#stone);stroke:#7A6550;stroke-width:2}
      .thin{fill:#0B0D0F;stroke:#465B63;stroke-width:1.5}
      .gold{fill:#B8944C}
      .cyanStroke{stroke:#7BA7BC;stroke-width:2;filter:url(#glow)}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g id="playfield">
    <rect x="190" y="92" width="1220" height="650" rx="10" fill="#090B0D" stroke="#1F2528" stroke-width="2"/>
    <path d="M800 205 L1240 425 L800 645 L360 425 Z" fill="url(#floor)" opacity="0.95"/>
    <path d="M360 425 L800 205 L1240 425" fill="none" stroke="#4A3F3F" stroke-width="16" opacity="0.35"/>
    <path d="M500 512 C610 565 715 568 790 540" fill="none" stroke="#1A2B30" stroke-width="28" opacity="0.75"/>
    <path d="M510 510 C625 548 710 552 786 535" fill="none" stroke="#314B54" stroke-width="10" opacity="0.75"/>
    <path d="M930 258 L998 294 L948 326 L882 290 Z" fill="#0B1215" stroke="#62A8BF" stroke-width="3" opacity="0.85"/>
    <path d="M960 260 L944 326" class="cyanStroke"/>
    <g opacity="0.7">
      <rect x="398" y="314" width="56" height="92" fill="#191819" stroke="#534846"/>
      <rect x="1150" y="330" width="66" height="116" fill="#191819" stroke="#534846"/>
      <rect x="590" y="230" width="390" height="48" fill="#181617" stroke="#3D3535"/>
      <circle cx="1120" cy="560" r="34" fill="#151514" stroke="#4A3F3F"/>
    </g>
    <g id="player" filter="url(#glow)">
      <circle cx="794" cy="470" r="20" fill="#0B0C0D" stroke="#A8C8D8" stroke-width="2"/>
      <path d="M794 428 L816 475 L795 514 L771 475 Z" fill="#22272B" stroke="#A8C8D8" stroke-width="2"/>
      <path d="M813 477 L850 498" stroke="#7BA7BC" stroke-width="4"/>
    </g>
    <g id="enemies">
      <circle cx="645" cy="405" r="18" fill="#2B1616" stroke="#8B1A1A" stroke-width="2"/>
      <circle cx="1042" cy="462" r="22" fill="#2B1616" stroke="#8B1A1A" stroke-width="2"/>
      <circle cx="896" cy="345" r="16" fill="#241A2D" stroke="#7956A6" stroke-width="2"/>
    </g>
  </g>

  <g id="top-left-hud">
    <rect x="34" y="30" width="390" height="116" rx="8" class="frame"/>
    <circle cx="92" cy="88" r="38" fill="#11161A" stroke="#7A6550" stroke-width="3"/>
    <path d="M78 95 L90 62 L112 96 Z" fill="#7BA7BC"/>
    <text x="148" y="64" class="label">WAR BLADE</text>
    <rect x="148" y="78" width="230" height="18" rx="4" fill="#1B0F10" stroke="#5E2525"/>
    <rect x="150" y="80" width="180" height="14" rx="3" fill="#8B1A1A"/>
    <rect x="148" y="106" width="230" height="14" rx="4" fill="#111B20" stroke="#355B68"/>
    <rect x="150" y="108" width="152" height="10" rx="3" fill="url(#cyan)"/>
    <text x="148" y="136" class="tiny">HP + class resource, compact and stable</text>
  </g>

  <g id="top-center">
    <rect x="618" y="26" width="365" height="56" rx="8" class="thin"/>
    <text x="700" y="58" class="label">CLEAR THE CHAIN HALL</text>
    <circle cx="658" cy="54" r="14" fill="#101315" stroke="#B8944C" stroke-width="2"/>
    <path d="M650 54 H666" stroke="#B8944C" stroke-width="3"/>
  </g>

  <g id="route-strip">
    <rect x="1192" y="28" width="360" height="92" rx="8" class="frame"/>
    <text x="1214" y="52" class="small">PARTIAL ROUTE</text>
    <g transform="translate(1225 72)">
      <circle cx="0" cy="0" r="13" fill="#A8C8D8"/>
      <line x1="16" y1="0" x2="74" y2="-18" stroke="#60707A" stroke-width="2"/>
      <line x1="16" y1="0" x2="74" y2="18" stroke="#60707A" stroke-width="2"/>
      <rect x="78" y="-33" width="34" height="34" rx="6" fill="#1A1D20" stroke="#B8944C"/>
      <rect x="78" y="1" width="34" height="34" rx="6" fill="#1A1D20" stroke="#7BA7BC"/>
      <line x1="116" y1="-16" x2="168" y2="-16" stroke="#374149" stroke-width="2" stroke-dasharray="5 5"/>
      <circle cx="184" cy="-16" r="15" fill="#0E1012" stroke="#374149"/>
      <text x="220" y="-10" class="tiny">step-2 fog</text>
    </g>
  </g>

  <g id="skillbar" transform="translate(478 772)">
    <rect x="-28" y="-18" width="700" height="108" rx="10" class="frame"/>
    <text x="-8" y="78" class="tiny">bottom-center skill bar: Q/E/R/F primary, Z/X secondary</text>
    <g>
      <rect x="0" y="0" width="76" height="76" rx="8" fill="#111315" stroke="#7BA7BC" stroke-width="3"/>
      <path d="M20 52 L38 18 L56 52 Z" fill="#7BA7BC"/>
      <text x="8" y="68" class="small">Q</text>
    </g>
    <g transform="translate(96 0)">
      <rect width="76" height="76" rx="8" fill="#111315" stroke="#7A6550" stroke-width="3"/>
      <circle cx="38" cy="38" r="20" fill="none" stroke="#A8C8D8" stroke-width="7" stroke-dasharray="88 126"/>
      <text x="8" y="68" class="small">E</text>
    </g>
    <g transform="translate(192 0)">
      <rect width="76" height="76" rx="8" fill="#111315" stroke="#7A6550" stroke-width="3"/>
      <path d="M22 20 H54 L44 56 H30 Z" fill="#B8944C"/>
      <text x="8" y="68" class="small">R</text>
    </g>
    <g transform="translate(288 0)">
      <rect width="76" height="76" rx="8" fill="#111315" stroke="#7A6550" stroke-width="3"/>
      <path d="M18 44 C28 18 48 18 58 44" fill="none" stroke="#8B1A1A" stroke-width="7"/>
      <text x="8" y="68" class="small">F</text>
    </g>
    <g transform="translate(416 0)" opacity="0.48">
      <rect width="76" height="76" rx="8" fill="#090A0B" stroke="#3D3535" stroke-width="3"/>
      <path d="M24 24 H52 V52 H24 Z" fill="none" stroke="#555" stroke-width="4"/>
      <text x="8" y="68" class="small">Z</text>
    </g>
    <g transform="translate(512 0)" opacity="0.48">
      <rect width="76" height="76" rx="8" fill="#090A0B" stroke="#3D3535" stroke-width="3"/>
      <path d="M22 52 L54 22" stroke="#555" stroke-width="5"/>
      <text x="8" y="68" class="small">X</text>
    </g>
  </g>

  <g id="passive-procs">
    <rect x="42" y="740" width="280" height="84" rx="8" class="thin"/>
    <text x="62" y="765" class="small">ACTIVE PROCS</text>
    <rect x="62" y="780" width="58" height="26" rx="5" fill="#17232A" stroke="#7BA7BC"/>
    <rect x="132" y="780" width="58" height="26" rx="5" fill="#261D2E" stroke="#7956A6"/>
    <rect x="202" y="780" width="58" height="26" rx="5" fill="#2B1A13" stroke="#B8944C"/>
  </g>

  <g id="interact">
    <rect x="686" y="668" width="232" height="42" rx="8" fill="#0B0D0F" stroke="#B8944C" stroke-width="2"/>
    <text x="720" y="695" class="label">[G] CLAIM REWARD</text>
  </g>

  <g id="reward-overlay" opacity="0.96">
    <rect x="1034" y="154" width="330" height="478" rx="10" fill="#070809" stroke="#3D3535" stroke-width="2"/>
    <text x="1070" y="190" class="label">REWARD DRAFT STATE</text>
    <g transform="translate(1065 218)">
      <rect width="86" height="128" rx="8" fill="#141719" stroke="#6A7075"/>
      <circle cx="43" cy="38" r="20" fill="#6A7075"/>
      <text x="17" y="110" class="tiny">COMMON</text>
    </g>
    <g transform="translate(1158 218)">
      <rect width="86" height="128" rx="8" fill="#111A20" stroke="#7BA7BC" stroke-width="2"/>
      <circle cx="43" cy="38" r="20" fill="#7BA7BC"/>
      <text x="24" y="110" class="tiny">RARE</text>
    </g>
    <g transform="translate(1251 218)">
      <rect width="86" height="128" rx="8" fill="#1C1422" stroke="#7956A6"/>
      <circle cx="43" cy="38" r="20" fill="#7956A6"/>
      <text x="22" y="110" class="tiny">EPIC</text>
    </g>
    <rect x="1070" y="384" width="260" height="64" rx="8" class="thin"/>
    <text x="1090" y="410" class="small">Build summary / tags</text>
    <text x="1090" y="434" class="tiny">Shown here, not in combat HUD</text>
    <rect x="1070" y="474" width="260" height="112" rx="8" class="thin"/>
    <text x="1090" y="502" class="small">Gate choice after pickup</text>
    <circle cx="1112" cy="538" r="16" fill="#7BA7BC"/>
    <circle cx="1168" cy="538" r="16" fill="#B8944C"/>
    <circle cx="1224" cy="538" r="16" fill="#8B1A1A"/>
  </g>
</svg>

