  </g>

  <g transform="translate(1090 385)">
    <rect width="320" height="200" rx="8" class="roomFrame"/>
    <text x="16" y="28" class="label">R09 Rift Well Edge Tear</text>
    <path d="M160 48 L290 112 L160 178 L30 112 Z" class="shell"/>
    <path d="M134 72 L232 112 L134 154 L58 112 Z" class="floor"/>
    <path d="M250 62 C224 94 226 130 256 164" class="rift"/>
    <path d="M232 78 C208 104 214 132 236 150" class="danger"/>
    <circle cx="258" cy="112" r="26" fill="#061012" stroke="#7BA7BC" stroke-width="3"/>
    <text x="16" y="184" class="tiny">combat core shifted away from side tear</text>
  </g>

  <g transform="translate(1440 385)">
    <rect width="320" height="200" rx="8" class="roomFrame"/>
    <text x="16" y="28" class="label">R10 Containment Arena</text>
    <circle cx="160" cy="112" r="82" class="shell"/>
    <path d="M160 50 L240 112 L160 174 L80 112 Z" class="floor"/>
    <circle cx="160" cy="112" r="28" fill="#111315" stroke="#7BA7BC" stroke-width="3"/>
    <circle cx="66" cy="70" r="14" class="block"/>
    <circle cx="254" cy="70" r="14" class="block"/>
    <circle cx="66" cy="154" r="14" class="block"/>
    <circle cx="254" cy="154" r="14" class="block"/>
    <path d="M80 78 L132 104 M240 78 L188 104 M80 148 L132 120 M240 148 L188 120" stroke="#6B5B4A" stroke-width="4"/>
    <text x="16" y="184" class="tiny">boss containment, center rift phase-only</text>
  </g>

  <g transform="translate(40 680)">
    <rect width="1720" height="440" rx="10" fill="#0B0D0F" stroke="#3D3535" stroke-width="2"/>
    <text x="24" y="40" class="title">Asset Pack Implications</text>
    <text x="24" y="78" class="label">Floor 128x64 flat top-surface</text>
    <text x="24" y="110" class="small">12 base, 8 worn/cracked, 6 wet edge, 6 rift hairline. Reject raised slabs and side faces.</text>
    <text x="24" y="158" class="label">Walls 128x192 and shell modules</text>
    <text x="24" y="190" class="small">straight wall, corners, broken cap, parapet, arch, cell bars, reliquary shelf, boss back wall.</text>
    <text x="24" y="238" class="label">Dash and water accents</text>
    <text x="24" y="270" class="small">dash gaps are walk-blocked candidates only; water and chasm stay visual/shell unless rules exist.</text>
    <text x="24" y="318" class="label">Detail sources</text>
    <text x="24" y="350" class="small">breach, rift tear, chain anchor, shrine, relic, wall base, gate threshold, landmark. No random scatter.</text>
    <g transform="translate(980 72)">
      <rect width="650" height="260" rx="8" fill="#080A0B" stroke="#465B63"/>
      <text x="24" y="36" class="label">Layer Stack</text>
      <rect x="24" y="62" width="230" height="28" class="void"/><text x="272" y="82" class="small">VoidBackdropMask</text>
      <rect x="24" y="100" width="230" height="28" class="shell"/><text x="272" y="120" class="small">VisualShellMask</text>
      <rect x="24" y="138" width="230" height="28" class="wall"/><text x="272" y="158" class="small">WallCollisionMask</text>
      <rect x="24" y="176" width="230" height="28" class="floor"/><text x="272" y="196" class="small">PlayableFloorMask</text>
      <path d="M24 228 H254" class="dash"/><text x="272" y="234" class="small">DashTraverseGap candidate</text>
    </g>
  </g>
</svg>

