    <path d="M160 70 L236 112 L160 154 L84 112 Z" class="floor"/>
    <rect x="62" y="80" width="46" height="28" class="wall"/>
    <rect x="62" y="118" width="46" height="28" class="wall"/>
    <rect x="212" y="80" width="46" height="28" class="wall"/>
    <rect x="212" y="118" width="46" height="28" class="wall"/>
    <path d="M80 93 L102 100 M218 134 L252 142" class="danger"/>
    <text x="16" y="184" class="tiny">side cells stage flanks, center readable</text>
  </g>

  <g transform="translate(1090 130)">
    <rect width="320" height="200" rx="8" class="roomFrame"/>
    <text x="16" y="28" class="label">R04 Broken Causeway</text>
