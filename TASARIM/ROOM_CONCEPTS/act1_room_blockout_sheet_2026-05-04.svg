<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
      .title{font-family:Arial, sans-serif;font-size:30px;fill:#E2EEF2;letter-spacing:0}
      .label{font-family:Arial, sans-serif;font-size:17px;fill:#D8E6EA;letter-spacing:0}
      .small{font-family:Arial, sans-serif;font-size:13px;fill:#A8C8D8;letter-spacing:0}
      .tiny{font-family:Arial, sans-serif;font-size:11px;fill:#A7A09A;letter-spacing:0}
      .roomFrame{fill:#0B0D0F;stroke:#3D3535;stroke-width:2}
      .floor{fill:#2C2A2A;stroke:#4A3F3F;stroke-width:2}
      .shell{fill:#151719;stroke:#5C4E4E;stroke-width:3}
      .wall{fill:#3D3535;stroke:#7A6550;stroke-width:3}
      .void{fill:#050607;stroke:#1A2327;stroke-width:2}
      .water{fill:#152B32;stroke:#4A8190;stroke-width:2}
      .rift{stroke:#7BA7BC;stroke-width:4;fill:none}
      .danger{stroke:#8B1A1A;stroke-width:3;fill:none}
      .gate{fill:#101315;stroke:#B8944C;stroke-width:4}
      .dash{fill:none;stroke:#A8C8D8;stroke-width:3;stroke-dasharray:8 7}
      .block{fill:#211F20;stroke:#8A7664;stroke-width:3}
      .legendBox{fill:#101315;stroke:#465B63;stroke-width:1.5}
    </style>
  </defs>
  <rect width="1800" height="1200" fill="#060708"/>
  <text x="40" y="52" class="title">RIMA Act 1 Shattered Keep - First Room Blockout Set</text>
  <text x="40" y="82" class="small">Readable playable floor, non-playable visual shell, authored walls, gate sockets, water/chasm accents, dash-only gap candidates.</text>

  <g id="legend" transform="translate(1240 24)">
    <rect width="500" height="92" rx="8" class="legendBox"/>
    <rect x="18" y="20" width="28" height="18" class="floor"/><text x="58" y="34" class="tiny">PlayableFloorMask</text>
    <rect x="184" y="20" width="28" height="18" class="wall"/><text x="224" y="34" class="tiny">WallCollision</text>
    <rect x="344" y="20" width="28" height="18" class="shell"/><text x="384" y="34" class="tiny">VisualShell</text>
    <rect x="18" y="56" width="28" height="18" class="water"/><text x="58" y="70" class="tiny">Water/low basin</text>
    <path d="M184 66 H214" class="dash"/><text x="224" y="70" class="tiny">DashTraverseGap</text>
    <path d="M344 66 H374" class="rift"/><text x="384" y="70" class="tiny">Rift source/decal</text>
  </g>

  <g transform="translate(40 130)">
    <rect width="320" height="200" rx="8" class="roomFrame"/>
    <text x="16" y="28" class="label">R01 Broken Entry Gate</text>
