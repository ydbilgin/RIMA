    <path d="M160 70 L246 112 L160 154 L74 112 Z" class="floor"/>
    <path d="M112 100 L136 112 L112 124 L88 112 Z" class="void"/>
    <path d="M202 100 L226 112 L202 124 L178 112 Z" class="void"/>
    <path d="M92 112 H134 M180 112 H224" class="dash"/>
    <path d="M52 116 C76 148 98 158 128 164" class="water"/>
    <text x="16" y="184" class="tiny">dash-only broken gaps, side water/chasm</text>
  </g>

  <g transform="translate(1440 130)">
    <rect width="320" height="200" rx="8" class="roomFrame"/>
    <text x="16" y="28" class="label">R05 Cross-Chain Clamp</text>
    <path d="M160 48 L286 112 L160 178 L34 112 Z" class="shell"/>
    <path d="M160 64 L248 112 L160 160 L72 112 Z" class="floor"/>
    <circle cx="70" cy="70" r="13" class="block"/>
    <circle cx="250" cy="70" r="13" class="block"/>
    <circle cx="70" cy="154" r="13" class="block"/>
    <circle cx="250" cy="154" r="13" class="block"/>
    <path d="M78 78 L242 146 M242 78 L78 146" stroke="#6B5B4A" stroke-width="4"/>
    <text x="16" y="184" class="tiny">elite pressure, chains are visual/decal lines</text>
  </g>

  <g transform="translate(40 385)">
    <rect width="320" height="200" rx="8" class="roomFrame"/>
    <text x="16" y="28" class="label">R06 Sunken Crypt Basin</text>
    <ellipse cx="160" cy="112" rx="126" ry="70" class="shell"/>
    <ellipse cx="160" cy="112" rx="88" ry="48" class="floor"/>
    <path d="M86 122 C112 146 152 154 194 142" class="water"/>
    <path d="M226 86 C246 94 256 106 260 128" class="water"/>
    <circle cx="106" cy="92" r="8" class="block"/>
    <circle cx="222" cy="140" r="9" class="block"/>
    <text x="16" y="184" class="tiny">water on edges, clean ring movement</text>
  </g>

  <g transform="translate(390 385)">
    <rect width="320" height="200" rx="8" class="roomFrame"/>
    <text x="16" y="28" class="label">R07 Reliquary Loop</text>
    <path d="M160 48 L288 112 L160 178 L32 112 Z" class="shell"/>
    <path d="M160 66 L252 112 L160 160 L68 112 Z" class="floor"/>
    <path d="M160 88 L204 112 L160 136 L116 112 Z" fill="#0B0D0F" stroke="#7A6550" stroke-width="3"/>
    <circle cx="160" cy="112" r="15" fill="#B8944C"/>
    <path d="M94 112 H128 M192 112 H226" class="dash"/>
    <text x="16" y="184" class="tiny">loop around relic, two clean dash cuts</text>
  </g>

  <g transform="translate(740 385)">
    <rect width="320" height="200" rx="8" class="roomFrame"/>
    <text x="16" y="28" class="label">R08 Shrine Crossroad</text>
    <path d="M160 40 L286 112 L160 184 L34 112 Z" class="shell"/>
    <path d="M160 64 L208 92 L256 112 L208 132 L160 160 L112 132 L64 112 L112 92 Z" class="floor"/>
    <circle cx="160" cy="86" r="18" fill="#11232A" stroke="#7BA7BC" stroke-width="3"/>
    <path d="M160 86 L160 156 M84 112 H236" class="rift"/>
    <rect x="134" y="42" width="52" height="24" class="gate"/>
    <rect x="240" y="100" width="36" height="24" class="gate"/>
