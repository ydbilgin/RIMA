    <path d="M160 68 L246 112 L160 156 L74 112 Z" class="floor"/>
    <rect x="126" y="48" width="70" height="28" class="wall"/>
    <path d="M132 164 L160 184 L188 164" class="gate"/>
    <path d="M145 82 L172 94" class="rift"/>
    <text x="16" y="184" class="tiny">first read, broad center, calm shell</text>
  </g>

  <g transform="translate(390 130)">
    <rect width="320" height="200" rx="8" class="roomFrame"/>
    <text x="16" y="28" class="label">R02 Ordered Guard Hall</text>
    <path d="M160 48 L286 112 L160 178 L34 112 Z" class="shell"/>
    <path d="M160 66 L256 112 L160 160 L64 112 Z" class="floor"/>
    <path d="M94 100 H128 V124 H104" class="block"/>
    <path d="M226 100 H192 V124 H216" class="block"/>
    <rect x="132" y="50" width="56" height="24" class="gate"/>
