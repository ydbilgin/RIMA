<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1800" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="1400" height="1800" fill="#1A2438"/>

  <!-- Title -->
  <text x="700" y="55" font-size="38" font-weight="bold" fill="#E8DCC4" text-anchor="middle">
    RIMA Map Painting System
  </text>
  <text x="700" y="90" font-size="18" fill="#9EB3C2" text-anchor="middle">
    Brush V1 — Katmanlı Mimari ve Üretim Akışı
  </text>
  <line x1="200" y1="105" x2="1200" y2="105" stroke="#4A5F7A" stroke-width="2"/>

  <!-- ============================= -->
  <!-- SECTION 1: LAYER STACK -->
  <!-- ============================= -->
  <text x="700" y="155" font-size="26" font-weight="bold" fill="#7BA7BC" text-anchor="middle">
    1. KATMAN MİMARİSİ (her oda üst üste katmanlardan oluşur)
  </text>

  <!-- Layered cake visualization (left side) -->
  <g transform="translate(80, 195)">
    <!-- Layer labels and bars - bottom up -->

    <!-- L1 Base -->
    <rect x="0" y="350" width="450" height="48" fill="#2A2F3F" stroke="#4A5F7A" stroke-width="2"/>
    <text x="225" y="380" font-size="18" fill="#E8DCC4" text-anchor="middle" font-weight="bold">
      L1 — Base Tone (zemin rengi)
    </text>

    <!-- L2 Floor -->
    <rect x="0" y="296" width="450" height="48" fill="#5A4A3A" stroke="#7A6A5A" stroke-width="2"/>
    <text x="225" y="326" font-size="18" fill="#E8DCC4" text-anchor="middle" font-weight="bold">
      L2 — Floor Atlas (tile'lar, random variant)
    </text>

    <!-- L3 Walls -->
    <rect x="0" y="242" width="450" height="48" fill="#4A4A5A" stroke="#6A6A8A" stroke-width="2"/>
    <text x="225" y="272" font-size="18" fill="#E8DCC4" text-anchor="middle" font-weight="bold">
      L3 — Walls Wang16 (16-tile corner set, auto-edge)
    </text>

    <!-- L4 Organic -->
    <rect x="0" y="188" width="450" height="48" fill="#3A5A3A" stroke="#5A8A5A" stroke-width="2"/>
    <text x="225" y="218" font-size="18" fill="#E8DCC4" text-anchor="middle" font-weight="bold">
      L4 — Organic (moss, dirt patches)
    </text>

    <!-- L5 Detail -->
    <rect x="0" y="134" width="450" height="48" fill="#4A4A4A" stroke="#6A6A6A" stroke-width="2"/>
    <text x="225" y="164" font-size="18" fill="#E8DCC4" text-anchor="middle" font-weight="bold">
      L5 — Detail (cracks, pebbles, bone fragments)
    </text>

    <!-- L6 Accent -->
    <rect x="0" y="80" width="450" height="48" fill="#6A2A3A" stroke="#8A4A5A" stroke-width="2"/>
    <text x="225" y="110" font-size="18" fill="#E8DCC4" text-anchor="middle" font-weight="bold">
      L6 — Accent (rift scar, battle aftermath)
    </text>

    <!-- Props -->
    <rect x="0" y="20" width="450" height="48" fill="#6A4A2A" stroke="#9A7A4A" stroke-width="2"/>
    <text x="225" y="50" font-size="18" fill="#E8DCC4" text-anchor="middle" font-weight="bold">
      🎯 PROPS (crate, urn, brazier — stamp)
    </text>

    <!-- Stack arrow -->
    <line x1="225" y1="0" x2="225" y2="20" stroke="#7BA7BC" stroke-width="3" marker-end="url(#arrowdown)"/>
    <text x="225" y="-5" font-size="14" fill="#7BA7BC" text-anchor="middle">üst üste binerler</text>
  </g>

  <!-- Final result image (right side) -->
  <g transform="translate(620, 195)">
    <text x="350" y="0" font-size="20" font-weight="bold" fill="#E8DCC4" text-anchor="middle">
      Sonuç: Hades-tarzı Zengin Oda
    </text>

    <!-- Mock room visualization -->
    <rect x="100" y="20" width="500" height="320" fill="#2D3548" stroke="#4A5F7A" stroke-width="3"/>

    <!-- Floor pattern -->
    <g opacity="0.8">
      <rect x="105" y="25" width="490" height="310" fill="#3D2F23"/>
      <!-- Floor tiles visible -->
      <rect x="120" y="40" width="60" height="60" fill="#4A3A2A" stroke="#5A4A3A"/>
      <rect x="185" y="40" width="60" height="60" fill="#3A2D1F" stroke="#5A4A3A"/>
      <rect x="250" y="40" width="60" height="60" fill="#4D3A28" stroke="#5A4A3A"/>
      <rect x="315" y="40" width="60" height="60" fill="#3D2D1B" stroke="#5A4A3A"/>
      <rect x="380" y="40" width="60" height="60" fill="#4D3A28" stroke="#5A4A3A"/>
      <rect x="445" y="40" width="60" height="60" fill="#3F2E1F" stroke="#5A4A3A"/>
      <rect x="120" y="105" width="60" height="60" fill="#3F2E1F" stroke="#5A4A3A"/>
      <rect x="185" y="105" width="60" height="60" fill="#4A3A2A" stroke="#5A4A3A"/>
      <rect x="250" y="105" width="60" height="60" fill="#4D3A28" stroke="#5A4A3A"/>
      <rect x="315" y="105" width="60" height="60" fill="#3D2D1B" stroke="#5A4A3A"/>
      <rect x="380" y="105" width="60" height="60" fill="#3F2E1F" stroke="#5A4A3A"/>
      <rect x="445" y="105" width="60" height="60" fill="#4D3A28" stroke="#5A4A3A"/>
    </g>

    <!-- Walls (Wang16) - top + bottom border -->
    <rect x="105" y="25" width="490" height="15" fill="#4A4A5A" stroke="#6A6A8A"/>
    <rect x="105" y="320" width="490" height="15" fill="#4A4A5A" stroke="#6A6A8A"/>
    <rect x="105" y="25" width="15" height="310" fill="#4A4A5A" stroke="#6A6A8A"/>
    <rect x="580" y="25" width="15" height="310" fill="#4A4A5A" stroke="#6A6A8A"/>

    <!-- L4 Moss patches -->
    <ellipse cx="155" cy="280" rx="35" ry="20" fill="#3A5A3A" opacity="0.85"/>
    <ellipse cx="500" cy="60" rx="40" ry="22" fill="#3A5A3A" opacity="0.85"/>
    <ellipse cx="380" cy="280" rx="30" ry="18" fill="#3A5A3A" opacity="0.85"/>

    <!-- L5 Cracks -->
    <line x1="200" y1="200" x2="280" y2="240" stroke="#1A1A1A" stroke-width="2"/>
    <line x1="280" y1="240" x2="320" y2="220" stroke="#1A1A1A" stroke-width="2"/>
    <line x1="420" y1="180" x2="480" y2="220" stroke="#1A1A1A" stroke-width="2"/>

    <!-- L6 Battle accent (dark stain) -->
    <ellipse cx="350" cy="180" rx="55" ry="35" fill="#3A1A1A" opacity="0.6"/>

    <!-- Props -->
    <!-- Crate -->
    <rect x="160" y="160" width="32" height="32" fill="#5A4A3A" stroke="#1A1A1A" stroke-width="2"/>
    <line x1="160" y1="166" x2="192" y2="166" stroke="#3A2A1A" stroke-width="1"/>
    <line x1="160" y1="186" x2="192" y2="186" stroke="#3A2A1A" stroke-width="1"/>
    <ellipse cx="176" cy="200" rx="18" ry="4" fill="#000" opacity="0.4"/>

    <!-- Urn -->
    <ellipse cx="440" cy="230" rx="12" ry="6" fill="#3A4045"/>
    <path d="M 428 230 Q 428 250 440 252 Q 452 250 452 230" fill="#4A5050" stroke="#1A1A1A" stroke-width="2"/>
    <ellipse cx="440" cy="260" rx="14" ry="3" fill="#000" opacity="0.4"/>

    <!-- Candle -->
    <rect x="280" y="120" width="6" height="20" fill="#E8DCC4"/>
    <ellipse cx="283" cy="118" rx="2" ry="4" fill="#FFB347"/>
    <rect x="278" y="140" width="10" height="6" fill="#3A2D1F"/>
    <ellipse cx="283" cy="150" rx="8" ry="3" fill="#000" opacity="0.4"/>

    <text x="350" y="370" font-size="14" fill="#9EB3C2" text-anchor="middle" font-style="italic">
      6 katman + props üst üste binince derin, doku-dolu oda
    </text>
  </g>

  <!-- ============================= -->
  <!-- SECTION 2: PRODUCTION FLOW -->
  <!-- ============================= -->
  <line x1="80" y1="650" x2="1320" y2="650" stroke="#4A5F7A" stroke-width="2"/>
  <text x="700" y="700" font-size="26" font-weight="bold" fill="#7BA7BC" text-anchor="middle">
    2. ÜRETİM AKIŞI (PNG'den oyuna)
  </text>

  <!-- Flow boxes -->
  <g transform="translate(40, 740)">
    <!-- Step 1: PixelLab -->
    <rect x="0" y="0" width="180" height="100" fill="#3A3A5A" stroke="#7BA7BC" stroke-width="2" rx="10"/>
    <text x="90" y="30" font-size="14" font-weight="bold" fill="#E8DCC4" text-anchor="middle">1. PIXELLAB</text>
    <text x="90" y="55" font-size="12" fill="#9EB3C2" text-anchor="middle">Create Image Pro V3</text>
    <text x="90" y="72" font-size="12" fill="#9EB3C2" text-anchor="middle">Prompt + Output Size</text>
    <text x="90" y="89" font-size="12" fill="#FFB347" text-anchor="middle">→ PNG sprite</text>

    <!-- Arrow 1 -->
    <line x1="190" y1="50" x2="220" y2="50" stroke="#7BA7BC" stroke-width="3" marker-end="url(#arrowright)"/>

    <!-- Step 2: Unity Import -->
    <rect x="230" y="0" width="180" height="100" fill="#3A4A3A" stroke="#7BA7BC" stroke-width="2" rx="10"/>
    <text x="320" y="30" font-size="14" font-weight="bold" fill="#E8DCC4" text-anchor="middle">2. UNITY IMPORT</text>
    <text x="320" y="55" font-size="12" fill="#9EB3C2" text-anchor="middle">PPU=64</text>
    <text x="320" y="72" font-size="12" fill="#9EB3C2" text-anchor="middle">Point filter</text>
    <text x="320" y="89" font-size="12" fill="#FFB347" text-anchor="middle">→ Sprite asset</text>

    <!-- Arrow 2 -->
    <line x1="420" y1="50" x2="450" y2="50" stroke="#7BA7BC" stroke-width="3" marker-end="url(#arrowright)"/>

    <!-- Step 3: Register -->
    <rect x="460" y="0" width="200" height="100" fill="#5A4A3A" stroke="#7BA7BC" stroke-width="2" rx="10"/>
    <text x="560" y="30" font-size="14" font-weight="bold" fill="#E8DCC4" text-anchor="middle">3. BRUSH V1 REGISTER</text>
    <text x="560" y="55" font-size="11" fill="#9EB3C2" text-anchor="middle">Tile: AssetPool + Brush</text>
    <text x="560" y="72" font-size="11" fill="#9EB3C2" text-anchor="middle">Prop: PropDefinitionSO</text>
    <text x="560" y="89" font-size="12" fill="#FFB347" text-anchor="middle">→ Editor palette</text>

    <!-- Arrow 3 -->
    <line x1="670" y1="50" x2="700" y2="50" stroke="#7BA7BC" stroke-width="3" marker-end="url(#arrowright)"/>

    <!-- Step 4: Brush Editor -->
    <rect x="710" y="0" width="200" height="100" fill="#5A3A4A" stroke="#7BA7BC" stroke-width="2" rx="10"/>
    <text x="810" y="30" font-size="14" font-weight="bold" fill="#E8DCC4" text-anchor="middle">4. BRUSH EDITOR</text>
    <text x="810" y="55" font-size="11" fill="#9EB3C2" text-anchor="middle">Paint (tile) / Place (prop)</text>
    <text x="810" y="72" font-size="11" fill="#9EB3C2" text-anchor="middle">Open existing room asset</text>
    <text x="810" y="89" font-size="12" fill="#FFB347" text-anchor="middle">→ Room edits</text>

    <!-- Arrow 4 -->
    <line x1="920" y1="50" x2="950" y2="50" stroke="#7BA7BC" stroke-width="3" marker-end="url(#arrowright)"/>

    <!-- Step 5: Save -->
    <rect x="960" y="0" width="180" height="100" fill="#4A4A6A" stroke="#7BA7BC" stroke-width="2" rx="10"/>
    <text x="1050" y="30" font-size="14" font-weight="bold" fill="#E8DCC4" text-anchor="middle">5. SAVE ASSET</text>
    <text x="1050" y="55" font-size="11" fill="#9EB3C2" text-anchor="middle">RoomTemplateSO</text>
    <text x="1050" y="72" font-size="11" fill="#9EB3C2" text-anchor="middle">Library/Combat_X.asset</text>
    <text x="1050" y="89" font-size="12" fill="#FFB347" text-anchor="middle">→ Persistent room</text>

    <!-- Arrow 5 -->
    <line x1="1150" y1="50" x2="1180" y2="50" stroke="#7BA7BC" stroke-width="3" marker-end="url(#arrowright)"/>

    <!-- Step 6: Runtime -->
    <rect x="1190" y="0" width="160" height="100" fill="#3A5A4A" stroke="#7BA7BC" stroke-width="2" rx="10"/>
    <text x="1270" y="30" font-size="14" font-weight="bold" fill="#E8DCC4" text-anchor="middle">6. GAME RUNTIME</text>
    <text x="1270" y="55" font-size="11" fill="#9EB3C2" text-anchor="middle">Room spawn</text>
    <text x="1270" y="72" font-size="11" fill="#9EB3C2" text-anchor="middle">Props instantiate</text>
    <text x="1270" y="89" font-size="12" fill="#FFB347" text-anchor="middle">→ Player sees</text>
  </g>

  <!-- ============================= -->
  <!-- SECTION 3: ASEPRITE PARALLEL -->
  <!-- ============================= -->
  <line x1="80" y1="900" x2="1320" y2="900" stroke="#4A5F7A" stroke-width="2"/>
  <text x="700" y="950" font-size="26" font-weight="bold" fill="#7BA7BC" text-anchor="middle">
    3. ASEPRITE PARALELI (zihin modeli)
  </text>

  <!-- Comparison: Aseprite vs Brush V1 -->
  <g transform="translate(150, 1000)">
    <!-- Aseprite side -->
    <rect x="0" y="0" width="500" height="280" fill="#2A3548" stroke="#9EB3C2" stroke-width="2" rx="10"/>
    <text x="250" y="40" font-size="22" font-weight="bold" fill="#E8DCC4" text-anchor="middle">ASEPRITE</text>

    <rect x="40" y="60" width="420" height="60" fill="#3A4558" stroke="#7BA7BC" stroke-width="1.5" rx="5"/>
    <text x="250" y="85" font-size="16" fill="#E8DCC4" text-anchor="middle" font-weight="bold">Tilemap Mode</text>
    <text x="250" y="105" font-size="12" fill="#9EB3C2" text-anchor="middle">Tile palette + click+drag paint</text>

    <rect x="40" y="135" width="420" height="60" fill="#3A4558" stroke="#7BA7BC" stroke-width="1.5" rx="5"/>
    <text x="250" y="160" font-size="16" fill="#E8DCC4" text-anchor="middle" font-weight="bold">Stamp Tool</text>
    <text x="250" y="180" font-size="12" fill="#9EB3C2" text-anchor="middle">Saved selection → click to place</text>

    <rect x="40" y="210" width="420" height="50" fill="#3A4558" stroke="#7BA7BC" stroke-width="1.5" rx="5"/>
    <text x="250" y="235" font-size="14" fill="#E8DCC4" text-anchor="middle" font-weight="bold">Wang Tileset</text>
    <text x="250" y="252" font-size="11" fill="#9EB3C2" text-anchor="middle">Auto-edge connection</text>

    <!-- Equals sign -->
    <text x="550" y="155" font-size="48" fill="#FFB347" text-anchor="middle" font-weight="bold">≈</text>

    <!-- RIMA Brush V1 side -->
    <rect x="600" y="0" width="500" height="280" fill="#2A4838" stroke="#9EB3C2" stroke-width="2" rx="10"/>
    <text x="850" y="40" font-size="22" font-weight="bold" fill="#E8DCC4" text-anchor="middle">RIMA BRUSH V1</text>

    <rect x="640" y="60" width="420" height="60" fill="#3A5848" stroke="#7BA7BC" stroke-width="1.5" rx="5"/>
    <text x="850" y="85" font-size="16" fill="#E8DCC4" text-anchor="middle" font-weight="bold">Brush Tab</text>
    <text x="850" y="105" font-size="12" fill="#9EB3C2" text-anchor="middle">L2/L3/L4/L5/L6 tile + decal paint</text>

    <rect x="640" y="135" width="420" height="60" fill="#3A5848" stroke="#7BA7BC" stroke-width="1.5" rx="5"/>
    <text x="850" y="160" font-size="16" fill="#E8DCC4" text-anchor="middle" font-weight="bold">Props Tab</text>
    <text x="850" y="180" font-size="12" fill="#9EB3C2" text-anchor="middle">PropDefinitionSO → click to place (+R rotate)</text>

    <rect x="640" y="210" width="420" height="50" fill="#3A5848" stroke="#7BA7BC" stroke-width="1.5" rx="5"/>
    <text x="850" y="235" font-size="14" fill="#E8DCC4" text-anchor="middle" font-weight="bold">Wang16 SliceTemplate</text>
    <text x="850" y="252" font-size="11" fill="#9EB3C2" text-anchor="middle">L3_Wang16_Topdown — auto-edge</text>
  </g>

  <!-- ============================= -->
  <!-- SECTION 4: KEY CONCEPTS -->
  <!-- ============================= -->
  <line x1="80" y1="1320" x2="1320" y2="1320" stroke="#4A5F7A" stroke-width="2"/>
  <text x="700" y="1370" font-size="26" font-weight="bold" fill="#7BA7BC" text-anchor="middle">
    4. NEDEN KATMAN KATMAN?
  </text>

  <g transform="translate(150, 1410)">
    <!-- Wrong way -->
    <rect x="0" y="0" width="450" height="240" fill="#4A2A2A" stroke="#8A4A4A" stroke-width="2" rx="10"/>
    <text x="225" y="35" font-size="20" font-weight="bold" fill="#E8DCC4" text-anchor="middle">❌ TEK KATMAN (sterile)</text>

    <text x="225" y="75" font-size="14" fill="#FFCACA" text-anchor="middle">• Floor tile'lar tekrarlı, sıkıcı</text>
    <text x="225" y="100" font-size="14" fill="#FFCACA" text-anchor="middle">• Duvarlar düz, doku yok</text>
    <text x="225" y="125" font-size="14" fill="#FFCACA" text-anchor="middle">• Hiç moss, crack, decal yok</text>
    <text x="225" y="150" font-size="14" fill="#FFCACA" text-anchor="middle">• "Boş arena" hissi</text>
    <text x="225" y="175" font-size="14" fill="#FFCACA" text-anchor="middle">• Her oda aynı</text>
    <text x="225" y="210" font-size="13" fill="#9EB3C2" text-anchor="middle" font-style="italic">= Variety yok, oyuncu sıkılır</text>

    <!-- Right way -->
    <rect x="500" y="0" width="450" height="240" fill="#2A4A2A" stroke="#4A8A4A" stroke-width="2" rx="10"/>
    <text x="725" y="35" font-size="20" font-weight="bold" fill="#E8DCC4" text-anchor="middle">✅ 6 KATMAN + PROPS (rich)</text>

    <text x="725" y="75" font-size="14" fill="#CAFFCA" text-anchor="middle">• L2 random floor + L4 moss → organic zemin</text>
    <text x="725" y="100" font-size="14" fill="#CAFFCA" text-anchor="middle">• L3 Wang16 + L4 moss → doğal duvarlar</text>
    <text x="725" y="125" font-size="14" fill="#CAFFCA" text-anchor="middle">• L6 rift scar + L5 bones → hikaye</text>
    <text x="725" y="150" font-size="14" fill="#CAFFCA" text-anchor="middle">• Brazier + candles → ışıklı, canlı</text>
    <text x="725" y="175" font-size="14" fill="#CAFFCA" text-anchor="middle">• Her oda farklı kombinasyon</text>
    <text x="725" y="210" font-size="13" fill="#9EB3C2" text-anchor="middle" font-style="italic">= Hades derinliği, oyuncu keşfetmek ister</text>
  </g>

  <!-- ============================= -->
  <!-- FOOTER -->
  <!-- ============================= -->
  <line x1="80" y1="1690" x2="1320" y2="1690" stroke="#4A5F7A" stroke-width="2"/>
  <text x="700" y="1730" font-size="14" fill="#9EB3C2" text-anchor="middle">
    RIMA Map Painting System v1 — Brush V1 SHIP-READY (321/321 EditMode PASS)
  </text>
  <text x="700" y="1755" font-size="12" fill="#6E7E92" text-anchor="middle">
    Karar #74 (PPU=64) + Karar #100 (chibi 30-35°) + Karar #143-E (Layered Pipeline) + Karar #144 (silahsız body)
  </text>
  <text x="700" y="1780" font-size="11" fill="#6E7E92" text-anchor="middle">
    2026-05-18 S87 — Laureth Studio knowledge base
  </text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowright" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7BA7BC"/>
    </marker>
    <marker id="arrowdown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 0 L 5 10 z" fill="#7BA7BC"/>
    </marker>
  </defs>
</svg>
